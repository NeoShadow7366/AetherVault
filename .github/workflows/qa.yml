name: Generative AI Manager - QA Guardian

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  fast_tests:
    name: Fast Tests (${{ matrix.os }} - Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'requirements-qa.txt'

    - name: Install Pure QA Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-qa.txt

    - name: Execute Fast Pytest
      run: |
        python .tests/run_tests.py

  e2e_tests:
    name: Full E2E Tests (Ubuntu - Python 3.12)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'requirements-qa.txt'

    - name: Install Pure QA Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-qa.txt

    - name: Auto-Install Headless Playwright Drivers
      run: |
        python -m playwright install chromium --with-deps

    - name: Execute E2E Suite
      run: |
        python .tests/run_tests.py --e2e

    - name: Upload Playwright Forensic Traces
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-failure-traces
        path: test-results/
        retention-days: 7
